# Workflow to conditionally publish a Zensical project
#
# Manual trigger

name: Build & Publish Zensical Docs


on:
  workflow_dispatch:  # Manually trigger workflow

  workflow_run:       # After successful Megalinger workflow run
    workflows:
      - "MegaLinter"

  paths:              # Only if one of the specified paths is changed
    - "docs/**"
    - "includes/**"
    - "overrides/**"
    - "mkdocs.yaml"
      "zensical.toml"
  branches:
    - main
  types:
    - completed

permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - uses: actions/deploy-pages@v5
